<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priebbenow Group — Monash Institute of Pharmaceutical Sciences</title>
<link href="https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e2d4a; --teal-dark: #1a6b5a; --teal-mid: #2a9478;
    --teal-light: #4abf9f; --teal-pale: #e0f5ef; --magenta: #c0296b;
    --gray-100: #f7f8f9; --gray-200: #eaecef; --gray-400: #9ca3af;
    --gray-600: #5a6270; --gray-800: #2d3340; --white: #ffffff;
    --font: 'Aptos', 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--white); color: var(--gray-800); min-height: 100vh; display: flex; flex-direction: column; }

  /* HERO */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem 3rem;
    background: linear-gradient(160deg, #eef2f7 0%, #f8f7ff 50%, #fdf0f5 100%);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(42,148,120,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -80px; left: -80px;
    width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(192,41,107,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* LOGO */
  .logo-wrap { margin-bottom: 3rem; animation: fadeDown 0.7s ease both; text-align: center; }
  .logo { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 500; color: var(--navy); letter-spacing: 0.03em; text-transform: uppercase; line-height: 1; }
  .logo span { color: var(--teal-mid); }

  /* HERO BODY — buttons left, carousel right */
  .hero-body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3rem;
    width: 100%;
    max-width: 860px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  /* NAV BUTTONS */
  .nav-buttons { display: flex; flex-direction: column; gap: 0.75rem; width: 220px; flex-shrink: 0; }
  .nav-btn {
    display: block; padding: 1rem 1.75rem; border-radius: 6px;
    text-decoration: none; border: none; background: var(--teal-mid); color: white;
    font-family: var(--font); font-size: 0.95rem; font-weight: 500;
    letter-spacing: 0.03em; text-align: center;
    transition: background 0.4s ease, color 0.4s ease; cursor: pointer;
  }
  .nav-btn:hover { background: #000000; color: #ffffff; }

  /* CAROUSEL */
  .carousel-wrap { width: 200px; flex-shrink: 0; }
  .carousel-label {
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gray-400); margin-bottom: 0.75rem;
  }
  .carousel-overflow { overflow: hidden; border-radius: 6px; }
  .carousel-track { display: flex; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
  .carousel-track img {
    min-width: 100%; width: 100%; height: 280px; object-fit: contain;
    display: block; flex-shrink: 0; border-radius: 6px; background: var(--gray-100);
  }
  .carousel-caption-box { margin-top: 0.6rem; }
  .carousel-caption-journal { font-size: 0.8rem; font-weight: 500; color: var(--navy); font-style: italic; }
  .carousel-caption-detail { font-size: 0.72rem; color: var(--gray-400); font-weight: 300; margin-top: 1px; }

  /* FOOTER */
  footer { text-align: center; padding: 1.5rem 2rem; border-top: 1px solid var(--gray-200); background: var(--white); }
  footer p { font-size: 0.72rem; color: var(--gray-400); font-weight: 300; }
  footer a { color: var(--teal-mid); text-decoration: none; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 650px) {
    .hero-body { flex-direction: column; align-items: center; }
    .nav-buttons { width: 100%; max-width: 340px; }
    .carousel-wrap { width: 100%; max-width: 340px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="logo-wrap">
    <div class="logo">Priebbenow<span>Group</span></div>
  </div>

  <div class="hero-body">
    <nav class="nav-buttons">
      <a class="nav-btn" href="research.html">Research</a>
      <a class="nav-btn" href="priebbenow-publications.html">Publications</a>
      <a class="nav-btn" href="group-members.html">Group Members</a>
      <a class="nav-btn" href="contact.html">Contact</a>
    </nav>

    <div class="carousel-wrap">
      <div class="carousel-label">Recent Cover Articles</div>
      <div class="carousel-overflow">
        <div class="carousel-track" id="home-carousel-track"></div>
      </div>
      <div class="carousel-caption-box">
        <div class="carousel-caption-journal" id="carousel-journal"></div>
        <div class="carousel-caption-detail" id="carousel-detail"></div>
      </div>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Priebbenow Group · <a href="https://www.monash.edu/mips/themes/medicinal-chemistry" target="_blank">Monash Institute of Pharmaceutical Sciences</a> · 399 Royal Parade, Parkville VIC 3052</p>
</footer>

<script>
  let current = 0;
  let total = 0;
  let items = [];

  function goTo(n) {
    current = n;
    document.getElementById('home-carousel-track').style.transform = `translateX(-${n * 100}%)`;
    const item = items[n];
    document.getElementById('carousel-journal').textContent = [item.journal, item.year].filter(Boolean).join(' · ');
    const detail = [item.volume, item.pages].filter(Boolean).join(', pp. ');
    document.getElementById('carousel-detail').textContent = detail;
  }

  function buildCarousel(data) {
    items = data;
    total = data.length;
    const track = document.getElementById('home-carousel-track');
    track.innerHTML = data.map(item =>
      `<img src="${item.image}" alt="${item.journal || ''}" style="min-width:100%;width:100%;height:auto;display:block;flex-shrink:0;border-radius:6px;">`
    ).join('');
    goTo(0);
    setInterval(() => goTo((current + 1) % total), 3500);
  }

  fetch('covers.json')
    .then(r => r.json())
    .then(data => buildCarousel(data))
    .catch(() => {
      buildCarousel([
        { image: 'anie202305585-toc-0001-m.jpg', journal: 'Angewandte Chemie', year: '2023', volume: '', pages: '' },
        { image: 'jmcmar_2025_68_issue-8_xlargecover.jpg', journal: 'Journal of Medicinal Chemistry', year: '2025', volume: 'Vol. 68, No. 8', pages: '' },
        { image: 'accacs_2026_16_issue-5_xlargecover.jpg', journal: 'ACS Catalysis', year: '2026', volume: 'Vol. 16, No. 5', pages: '' },
        { image: 'jacsat_2025_147_issue-28_xlargecover.jpg', journal: 'JACS', year: '2025', volume: 'Vol. 147, No. 28', pages: '' }
      ]);
    });
</script>
</body>
</html>
